version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: finance-postgres
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: finance-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/finance_db
      KC_DB_USERNAME: finance_user
      KC_DB_PASSWORD: finance_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # DEV ONLY — tema değişiklikleri restart gerektirmesin diye cache'i kapat.
      # Production'da kaldır.
      KC_SPI_THEME_STATIC_MAX_AGE: -1
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
      # Browser localhost:8080 ile erişir (Chrome Secure cookies HTTP'de izin verir lokalhost'a).
      # Backend container içinden keycloak:8080 ile JWK çeker (docker internal DNS).
      # Token `iss` claim'i = http://localhost:8080/...; backend `jwk-set-uri` ayrı verir.
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /
    command: start-dev
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak-themes:/opt/keycloak/themes
      # Banlı kullanıcıyı 2FA öncesi engelleyen özel authenticator (SPI).
      # JAR'ı önce derle: ./mvnw -f keycloak-providers/ban-authenticator/pom.xml package
      # start-dev provider'ları açılışta otomatik build eder; sonra realm flow'una eklenmeli (README).
      - ./keycloak-providers/ban-authenticator/target/ban-authenticator.jar:/opt/keycloak/providers/ban-authenticator.jar
    depends_on:
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: finance-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # LibreTranslate — self-hosted TR<->EN çevirici. İlk açılışta language model'leri
  # indirir (~500MB tr+en). LOAD_ONLY ile sadece TR ve EN modelleri yüklenir, RAM tasarrufu.
  # API: POST http://localhost:5050/translate  body: {q, source, target}
  # NewsSyncService TR haberlerin title/description'ını EN'e çeviriyor (sync sırasında).
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: finance-libretranslate
    # Modeller container'ın kendi dizininde kalsın — named volume permission sorunu
    # (Errno 13) çıkarıyor. docker rm yapılmadığı sürece modeller kalıcı.
    environment:
      LT_LOAD_ONLY: "tr,en"
      LT_DISABLE_WEB_UI: "false"
      LT_UPDATE_MODELS: "false"
    ports:
      - "5050:5000"
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/languages')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  openldap:
    image: osixia/openldap:1.5.0
    container_name: finance-openldap
    environment:
      LDAP_ORGANISATION: "Finance Portal"
      LDAP_DOMAIN: "finance.local"
      LDAP_ADMIN_PASSWORD: "adminpassword"
    ports:
      - "1389:389"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    restart: unless-stopped

  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: finance-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "finance-openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8082:80"
    depends_on:
      - openldap
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finance-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finance-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 🚀 DÜZELTİLDİ: Listener haritası tutarlı hale getirildi
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://finance-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ALLOW_AUTO_CREATE_TOPICS: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: finance-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    container_name: finance-os-dashboards
    ports:
      - "5601:5601"
    environment:
      # 🚀 DÜZELTİLDİ: Alt tire (finance_opensearch) tireye çevrildi
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy

  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:8.9.0
    container_name: finance-logstash
    volumes:
      - ./logs:/usr/share/logstash/logs
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy

  # ==========================================================================
  #  OBSERVABILITY — 3 pillar: Metrics + Traces + Logs -> Grafana
  #  (Logs ayağı zaten Kafka -> Logstash -> OpenSearch ile çalışıyor.)
  # ==========================================================================

  # OTel Collector — Java Agent'tan OTLP (:4317/:4318) alır;
  #   traces -> Tempo, metrics -> Prometheus exporter (:8889).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: finance-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (agent -> collector)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (collector -> prometheus scrape)
    depends_on:
      - tempo
    restart: unless-stopped

  # Tempo — dağıtık izleme (trace) deposu. Grafana Tempo datasource :3200'e bağlanır.
  tempo:
    image: grafana/tempo:2.4.1
    container_name: finance-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana)
    restart: unless-stopped

  # Prometheus — metrik deposu. Backend /actuator/prometheus + collector :8889 scrape eder.
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: finance-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-remote-write-receiver'   # Tempo metrics_generator remote_write için
      - '--enable-feature=exemplar-storage'
      - '--web.enable-lifecycle'               # POST /-/reload ile config/kural hot-reload
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # container -> host'taki backend (Linux uyumu)
    restart: unless-stopped

  # Grafana — birleşik görselleştirme (Prometheus + Tempo + OpenSearch).
  grafana:
    image: grafana/grafana:10.4.0
    container_name: finance-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-opensearch-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      # Editor: anonim kullanıcı Explore'a erişebilsin (trace linkine tıklayınca
      # Tempo Explore açılır). Viewer rolü Explore'a giremez -> link home'a atar.
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - opensearch
    restart: unless-stopped

  # ==========================================================================
  #  UYGULAMA — Backend (Spring Boot 3.3.9 + Java 21) + Frontend (React 19 + Nginx)
  #  Bu iki servis için image yerelde build edilir (Dockerfile içeren dizin).
  # ==========================================================================

  app-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: finance-portal-backend:local
    container_name: finance-app-backend
    environment:
      # Spring profile — docker; application-docker.yml ek override sağlar
      SPRING_PROFILES_ACTIVE: docker
      # application.yaml `${VAR:default}` okuyor; container DNS'lerini override ediyoruz
      DB_URL: jdbc:postgresql://postgres:5432/finance_db
      DB_USERNAME: finance_user
      DB_PASSWORD: finance_password
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_LOG_BOOTSTRAP_SERVERS: kafka:29092
      # Keycloak issuer: browser ile aynı (token iss claim match için)
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/finance-realm
      # JWK Set: backend container içinden keycloak'a internal DNS ile
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: finance-realm
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_CLIENT_ID: finance-client
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      # OpenTelemetry — container DNS
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: finance-portal-backend
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
      otel-collector:
        condition: service_started
    restart: unless-stopped

  app-frontend:
    build:
      context: ../finance-frontend
      dockerfile: Dockerfile
      args:
        # Browser'dan API'ye relative path — nginx /api/ → app-backend:8081 proxy eder.
        VITE_API_BASE_URL: /api/v1
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: finance-realm
        VITE_KEYCLOAK_CLIENT_ID: finance-client
        VITE_APP_URL: http://localhost:5173
    image: finance-portal-frontend:local
    container_name: finance-app-frontend
    ports:
      - "5173:80"
    depends_on:
      - app-backend
    restart: unless-stopped

  # SonarQube — kod kalitesi / statik analiz.
  # NORMAL `docker compose up` ile BAŞLAMAZ (profiles: sonar).
  # Sadece istenince:  docker compose --profile sonar up -d sonarqube
  # İlk giriş: admin / admin → şifre değiştir → My Account > Security > token üret
  # Dokümantasyon: docs/sonar.md
  sonarqube:
    image: sonarqube:community
    container_name: finance-sonarqube
    profiles:
      - sonar
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:
  ldap_data:
  ldap_config:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  tempo_data:
  prometheus_data:
  grafana_data: