# Docker Compose profile — container'lar arası DNS kullanır.
#
# `app-backend` servisi `SPRING_PROFILES_ACTIVE=docker` ile başlatılınca bu dosya yüklenir.
# Override edilen değerler: DB/Redis/Kafka host'ları + Keycloak issuer/JWK URI.
#
# Keycloak iki URL'le yönetilir:
#   issuer-uri  = http://localhost:8080/...   ← browser ile aynı (token `iss` claim match)
#   jwk-set-uri = http://keycloak:8080/...    ← backend container içinden internal DNS
# Bu sayede browser localhost'a (Chrome Secure cookies HTTP'de izin verir) erişir,
# backend container keycloak'a internal DNS ile ulaşır; token `iss` validation yine çalışır.

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/finance_db
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD:finance_password}

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    # Local docker-compose: kafka:29092 (advertised listener). K8s'de Kafka Service
    # port 9092. Env var ile override (KAFKA_BOOTSTRAP_SERVERS).
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

# CORS: docker-compose local'de http://localhost:5173; K8s/cloud HTTPS nip.io
# host'undan istek atar. Env CORS_ALLOWED_ORIGINS ile override edilir (open-cluster.ps1
# ve k6/HPA testleri sirasinda dogru pattern).
security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:*}

  # NOT: Aktif OAuth2 doğrulaması base application.yaml'daki spring.security.oauth2 +
  # KEYCLOAK_ISSUER_URI / KEYCLOAK_JWK_SET_URI env var'larından çözülür (docker-compose set eder).
  # Aşağıdaki blok girinti nedeniyle spring.* dışında (security.security.*) kaldığından okunmuyor;
  # auth tamamen base config'ten çalışır. Override amacıyla eklenmişti, etkin değil.
  security:
    oauth2:
      resourceserver:
        jwt:
          # Env ile override edilebilir; lokal docker-compose'da default localhost,
          # K8s'de KEYCLOAK_ISSUER_URI env'i ile public LB IP'sine yönlenir.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/finance-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs}

keycloak:
  server-url: http://keycloak:8080
  realm: finance-realm

# Log hattı backend -> Kafka -> Logstash -> OpenSearch üzerinden çalışır
# (log4j2 Kafka appender + logstash.conf; Logstash Kafka topic'inden besleniyor).
# Aşağıdaki host/port doğrudan Beats/TCP appender için planlanmıştı; aktif log hattı
# Kafka üzerinden gittiği için bu değerler okunmuyor (atıl).
logstash:
  host: logstash
  port: 5044

# OpenTelemetry ayarları OTEL_EXPORTER_OTLP_ENDPOINT gibi env var'lardan OTel Java Agent
# tarafından okunur (docker-compose set eder); aşağıdaki Spring 'otel.*' bloğu okunmuyor (atıl).
otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317
