# Docker Compose profile — container'lar arası DNS kullanır.
#
# `app-backend` servisi `SPRING_PROFILES_ACTIVE=docker` ile başlatılınca bu dosya yüklenir.
# Override edilen değerler: DB/Redis/Kafka host'ları + Keycloak issuer/JWK URI.
#
# Keycloak iki URL'le yönetilir:
#   issuer-uri  = http://localhost:8080/...   ← browser ile aynı (token `iss` claim match)
#   jwk-set-uri = http://keycloak:8080/...    ← backend container içinden internal DNS
# Bu sayede browser localhost'a (Chrome Secure cookies HTTP'de izin verir) erişir,
# backend container keycloak'a internal DNS ile ulaşır; token `iss` validation yine çalışır.

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/finance_db
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD:finance_password}

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:29092

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/finance-realm
          jwk-set-uri: http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs

keycloak:
  server-url: http://keycloak:8080
  realm: finance-realm

# Logstash adresi — Logstash container service name'i
logstash:
  host: logstash
  port: 5044

# OpenTelemetry — Collector container ismi
otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317
