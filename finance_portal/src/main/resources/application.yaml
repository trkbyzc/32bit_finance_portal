spring:
  application:
    name: finance-portal
  profiles:
    # Aktif profil zinciri (son okunan üstte):
    #   dev    — application-dev.yml: SQL log, full actuator, DEBUG log
    #   local  — application-local.yml: API key'ler (gitignored, dev makinesi)
    #   docker — application-docker.yml: container DNS + Keycloak JWK
    #   prod   — application-prod.yml: hardening (log WARN, actuator kısıtlı)
    #   test   — application-test.yml: H2 in-memory, mock'lar
    # Override sırası: profil dosyası > base application.yaml > kod default'u.
    active: ${SPRING_PROFILES_ACTIVE:dev,local}

  # PostgreSQL Konfigürasyonu
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance_db}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD:finance_password}
    driver-class-name: org.postgresql.Driver

  # Hibernate Konfigürasyonu
  jpa:
    hibernate:
      ddl-auto: validate # Flyway aktif olduğu için validate bırakılmalıdır
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true


  # Flyway Konfigürasyonu
  flyway:
    enabled: true
    baseline-on-migrate : true
    baseline-version: 0


  # Redis Konfigürasyonu
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Mail (price alarm bildirimleri). Credentials application-local.yml'de.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false
    default-encoding: UTF-8

  # Thymeleaf — e-posta template'leri için (web view değil)
  thymeleaf:
    enabled: true
    prefix: classpath:/templates/
    suffix: .html
    cache: true
    check-template-location: true

  # Kafka Konfigürasyonu
  kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      producer:
      # ... gerisi aynı kalacak
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      consumer:
        group-id: finance-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          spring.json.trusted.packages: "*" # Her paketten gelen JSON'a güven

  # Keycloak / OAuth2 Resource Server Konfigürasyonu
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/finance-realm}
          # Backend container içinden JWK Set'ini doğrudan keycloak container'ından çekmek için
          # ayrı URI. Token `iss` claim'i issuer-uri ile match'lenir; JWK ayrı host'tan gelir.
          # Lokal dev'de boş bırak (issuer-uri OIDC discovery yapar); docker'da env override eder.
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:}

# Keycloak Admin Client Konfigürasyonu
keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:finance-realm}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}





# ============================================================================
#  Actuator / Observability — DİKKAT: 'management' TOP-LEVEL'dır, spring altında DEĞİL.
#  (Eskiden yanlışlıkla spring: altındaydı; o yüzden /actuator/prometheus boştu.)
#
#  Trace'ler OTel Java Agent (-javaagent) ile toplanır, in-code tracer yok;
#  bu yüzden burada tracing.sampling YOK — örnekleme agent tarafında
#  OTEL_TRACES_SAMPLER env'i ile kontrol edilir (bkz. run-dev.ps1).
# ============================================================================
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics" # Prometheus bu ucu scrape eder
  endpoint:
    health:
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      # Tüm metriklere ortak etiket — Grafana/Prometheus'ta servisi ayırt etmek için
      application: ${spring.application.name:finance-portal}
    # http.client.requests URI cardinality limit'i — backend Yahoo + BusinessInsider
    # + CoinGecko gibi per-symbol URL'lere çok istek atıyor; default 100 hızla doluyor.
    # 2000'e çıkarınca tüm tag'lar tutulur, Prometheus cardinality kabul edilebilir.
    web:
      client:
        max-uri-tags: 2000
    distribution:
      # http.server.requests için histogram bucket'larını yayınla.
      # Olmazsa sadece _count/_sum üretilir; Grafana'daki p50/p95/p99
      # (histogram_quantile + _bucket) "No data" gösterir.
      percentiles-histogram:
        http.server.requests: true
      # Latency bucket aralığı (1ms..5s) — quantile çözünürlüğü için
      minimum-expected-value:
        http.server.requests: 1ms
      maximum-expected-value:
        http.server.requests: 5s
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
  health:
    mail:
      enabled: false # SMTP opsiyonel (anahtarsız çalışır); /health'i DOWN yapmasın


server:
  port: ${SERVER_PORT:8081}
  # 32bit isteri #18: REST API versiyonlama — tüm controller'ların kök prefix'i.
  # Sonradan v2'ye geçmek için yalnızca bu değer değişir; controller path'leri kalır.
  servlet:
    context-path: /api/v1

evds:
  # `evds3.tcmb.gov.tr/igmevdsms-dis` İnteraktif Grafik Modülü endpoint'i — projedeki
  # çoğu indicator bu URL üzerinden stabil dönüyor. Resmi public REST (`evds2/service/evds`)
  # bizim setup'ta diğer serileri bozdu, geri çevrildi. Kullanılamayan seriler (GSYİH vb.)
  # EconomyIndicators'tan kaldırıldı.
  base-url: ${EVDS_BASE_URL:https://evds3.tcmb.gov.tr/igmevdsms-dis}
  api-key: ${EVDS_API_KEY:}

# Dış API URL Konfigürasyonu
external-api:
  coingecko:
    base-url: ${COINGECKO_BASE_URL:https://api.coingecko.com/api/v3}
  tcmb:
    xml-url: ${TCMB_XML_URL:https://www.tcmb.gov.tr/kurlar/today.xml}
  binance:
    base-url: ${BINANCE_BASE_URL:https://api.binance.com}
  businessinsider:
    base-url: ${BUSINESSINSIDER_BASE_URL:https://markets.businessinsider.com}
  fred:
    base-url: ${FRED_BASE_URL:https://api.stlouisfed.org}
    api-key: ${FRED_API_KEY:}
  fmp:
    base-url: ${FMP_BASE_URL:https://financialmodelingprep.com}
    api-key: ${FMP_API_KEY:}
  finnhub:
    base-url: ${FINNHUB_BASE_URL:https://finnhub.io}
    api-key: ${FINNHUB_API_KEY:}
  lingva:
    url: ${LINGVA_URL:http://localhost:5050}
    timeout-ms: ${LINGVA_TIMEOUT_MS:15000}
  yahoo:
    base-url: ${YAHOO_FINANCE_BASE_URL:https://query1.finance.yahoo.com/v8/finance/chart/}
  truncgil:
    url: ${TRUNCGIL_URL:https://finans.truncgil.com/v3/today.json}
  fintables:
    api-url: ${FINTABLES_API_URL:https://api.fintables.com}
    markets-url: ${FINTABLES_MARKETS_URL:https://markets.fintables.com}
  hesapkurdu:
    url: ${HESAPKURDU_URL:https://apigw.hesapkurdu.com/v1/forex/fx/getExchangeRates}
  feargreed:
    url: ${FEAR_GREED_URL:https://api.alternative.me/fng/?limit=0&format=json}
  isyatirim:
    fundamentals-url: ${ISYATIRIM_FUNDAMENTALS_URL:https://www.isyatirim.com.tr/tr-tr/analiz/hisse/Sayfalar/Temel-Degerler-Ve-Oranlar.aspx?endeks=09}
    index-base-url: ${ISYATIRIM_INDEX_BASE_URL:https://www.isyatirim.com.tr}
  tradingview-logo:
    base-url: ${TRADINGVIEW_LOGO_BASE_URL:https://s3-symbol-logo.tradingview.com/}

# Uygulama özelinde ayarlar
app:
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:noreply@finansportal.local}
    from-name: ${APP_MAIL_FROM_NAME:FinansPortal}
  alarm:
    eval-rate-ms: ${ALARM_EVAL_RATE_MS:120000}    # 2dk'da bir alarm değerlendirme
    continuous-cooldown-minutes: ${APP_ALARM_COOLDOWN_MINUTES:30}
  chat:
    enabled: ${APP_CHAT_ENABLED:true}
    history-max: ${APP_CHAT_HISTORY_MAX:20}        # context'e koyulacak max geçmiş mesaj
    user-rate-limit-per-min: ${APP_CHAT_USER_RATE:20}
  llm:
    # 2026 Q2: Gemini primary'e alındı (daha bol token bütçesi: ~1M input token/gün).
    # Groq fallback — hızlı ama günlük 100k TPD'de hemen tükeniyor.
    primary: ${APP_LLM_PRIMARY:gemini}              # gemini | groq
    fallback: ${APP_LLM_FALLBACK:groq}
    request-timeout-ms: ${APP_LLM_TIMEOUT_MS:30000}
    groq:
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      model: ${GROQ_MODEL:llama-3.3-70b-versatile}
      api-key: ${GROQ_API_KEY:}
    gemini:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      # gemini-2.0-flash → free tier'dan çıkarıldı (limit: 0).
      # gemini-1.5-flash → v1beta endpoint'inde 404 (deprecated).
      # gemini-2.5-flash → 2026 itibariyle güncel free tier modeli.
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      api-key: ${GEMINI_API_KEY:}
  rest:
    connect-timeout-sec: ${APP_REST_CONNECT_TIMEOUT_SEC:10}
    read-timeout-sec: ${APP_REST_READ_TIMEOUT_SEC:10}
  user-sync:
    cache-ttl-hours: ${APP_USER_SYNC_CACHE_TTL_HOURS:1}
  limits:
    max-tickers: ${APP_MAX_TICKERS:20}
    sparkline-max-points: ${APP_SPARKLINE_MAX_POINTS:30}
    max-tool-iterations: ${APP_MAX_TOOL_ITERATIONS:5}
    what-if-max-series-points: ${APP_WHAT_IF_MAX_SERIES_POINTS:300}
    what-if-per-asset-timeout-sec: ${APP_WHAT_IF_PER_ASSET_TIMEOUT_SEC:8}
    news-max-translations-per-run: ${APP_NEWS_MAX_TRANSLATIONS:60}
  ttl:
    news-content-days: ${APP_TTL_NEWS_CONTENT_DAYS:7}
    economic-calendar-hours: ${APP_TTL_ECONOMIC_CALENDAR_HOURS:6}
    eurobond-minutes: ${APP_TTL_EUROBOND_MINUTES:360}
    futures-minutes: ${APP_TTL_FUTURES_MINUTES:5}
    bist-last-good-minutes: ${APP_TTL_BIST_LAST_GOOD_MINUTES:2880}
    interest-series-hours: ${APP_TTL_INTEREST_SERIES_HOURS:12}
    effective-currency-live-sec: ${APP_TTL_EFFECTIVE_CURRENCY_LIVE_SEC:3600}
    effective-currency-history-sec: ${APP_TTL_EFFECTIVE_CURRENCY_HISTORY_SEC:86400}
    economy-sec: ${APP_TTL_ECONOMY_SEC:86400}
    us-economy-sec: ${APP_TTL_US_ECONOMY_SEC:86400}
    turkish-bond-sec: ${APP_TTL_TURKISH_BOND_SEC:86400}
    currency-history-sec: ${APP_TTL_CURRENCY_HISTORY_SEC:86400}
  sync:
    bank-currency-rate-ms: ${APP_SYNC_BANK_CURRENCY_RATE_MS:300000}
    commodity-rate-ms: ${APP_SYNC_COMMODITY_RATE_MS:300000}
    crypto-rate-ms: ${APP_SYNC_CRYPTO_RATE_MS:300000}
    currency-rate-ms: ${APP_SYNC_CURRENCY_RATE_MS:3600000}
    stock-rate-ms: ${APP_SYNC_STOCK_RATE_MS:300000}
    fund-rate-ms: ${APP_SYNC_FUND_RATE_MS:3600000}
    market-rate-ms: ${APP_SYNC_MARKET_RATE_MS:3600000}
    viop-rate-ms: ${APP_SYNC_VIOP_RATE_MS:300000}
    bist-index-rate-ms: ${APP_SYNC_BIST_INDEX_RATE_MS:86400000}
    news-rate-ms: ${APP_SYNC_NEWS_RATE_MS:900000}
    effective-currency-rate-ms: ${APP_SYNC_EFFECTIVE_CURRENCY_RATE_MS:3600000}
    economic-calendar-rate-ms: ${APP_SYNC_ECONOMIC_CALENDAR_RATE_MS:21600000}
    ipo-rate-ms: ${APP_SYNC_IPO_RATE_MS:3600000}
    future-rate-ms: ${APP_SYNC_FUTURE_RATE_MS:300000}
    market-hourly-rate-ms: ${APP_SYNC_MARKET_HOURLY_RATE_MS:3600000}
    market-fast-rate-ms: ${APP_SYNC_MARKET_FAST_RATE_MS:300000}
    isyatirim-fundamentals-refresh-ms: ${APP_SYNC_ISYATIRIM_FUNDAMENTALS_MS:1800000}
    tradingview-logo-refresh-ms: ${APP_SYNC_TRADINGVIEW_LOGO_MS:86400000}
  market:
    commodity-symbols: ${APP_COMMODITY_SYMBOLS:GC=F,SI=F,PL=F,PA=F,CL=F,BZ=F,NG=F,HG=F,ZW=F,ZC=F,KC=F,CC=F,CT=F}
    future-symbols: ${APP_FUTURE_SYMBOLS:ES=F,NQ=F,YM=F,RTY=F,ZN=F,ZB=F,ZF=F,6E=F,6B=F,6J=F}
    index-symbols: ${APP_INDEX_SYMBOLS:XU100.IS,XU030.IS,XU050.IS,XBANK.IS,XUSIN.IS,^GSPC,^IXIC,^NDX,^DJI,BITW}
    global-stock-symbols: ${APP_GLOBAL_STOCK_SYMBOLS:AAPL,MSFT,NVDA,TSLA,AMZN,GOOGL,META,NFLX,AMD,INTC,BABA,JPM,V,WMT,JNJ,PG,MA,HD,TSM,ASML,AVGO,QCOM,TXN,AMAT,MU,LRCX,KLAC,ADBE,CRM,ORCL}
