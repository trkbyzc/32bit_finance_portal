spring:
  application:
    name: finance-portal
  profiles:
    # 'local' profile application-local.yml dosyasındaki API key'leri yükler
    # (dosya gitignore'da, sadece geliştirici bilgisayarında bulunur)
    active: ${SPRING_PROFILES_ACTIVE:dev,local}

  # PostgreSQL Konfigürasyonu
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance_db}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD:finance_password}
    driver-class-name: org.postgresql.Driver

  # Hibernate Konfigürasyonu
  jpa:
    hibernate:
      ddl-auto: validate # Flyway aktif olduğu için validate bırakılmalıdır
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true


  # Flyway Konfigürasyonu
  flyway:
    enabled: true
    baseline-on-migrate : true
    baseline-version: 0


  # Redis Konfigürasyonu
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Kafka Konfigürasyonu
  kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      producer:
      # ... gerisi aynı kalacak
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      consumer:
        group-id: finance-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          spring.json.trusted.packages: "*" # Her paketten gelen JSON'a güven

  # Keycloak / OAuth2 Resource Server Konfigürasyonu
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/finance-realm}

# Keycloak Admin Client Konfigürasyonu
keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:finance-realm}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}



  # OpenLDAP Konfigürasyonu
  ldap:
    urls: ${LDAP_URL:ldap://localhost:1389}
    base: ${LDAP_BASE:dc=finance,dc=local}
    username: ${LDAP_USERNAME:cn=admin,dc=finance,dc=local}
    password: ${LDAP_PASSWORD:adminpassword}

  # OpenSearch Konfigürasyonu (Spring Data Elasticsearch via REST)
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  management:
    tracing:
      sampling:
        probability: 1.0 # %100: Gelen her HTTP isteğini ve metrikleri kaydet
    endpoints:
      web:
        exposure:
          include: "health,info,prometheus" # Performans metriklerini dışarı aç
    health:
      ldap:
        enabled: false # LDAP federation kullanılmıyor



server:
  port: ${SERVER_PORT:8081}

evds:
  base-url: ${EVDS_BASE_URL:https://evds3.tcmb.gov.tr/igmevdsms-dis}
  api-key: ${EVDS_API_KEY:}

# Dış API URL Konfigürasyonu
external-api:
  coingecko:
    base-url: ${COINGECKO_BASE_URL:https://api.coingecko.com/api/v3}
  tcmb:
    xml-url: ${TCMB_XML_URL:https://www.tcmb.gov.tr/kurlar/today.xml}
  evds:
    base-url: ${EVDS_API_BASE_URL:https://evds2.tcmb.gov.tr/service/evds}
    api-key: ${EVDS_API_KEY:}
  binance:
    base-url: ${BINANCE_BASE_URL:https://api.binance.com}
  fred:
    base-url: ${FRED_BASE_URL:https://api.stlouisfed.org}
    api-key: ${FRED_API_KEY:}
