spring:
  application:
    name: finance-portal
  profiles:
    active: dev

  # PostgreSQL Konfigürasyonu
  datasource:
    url: jdbc:postgresql://localhost:5432/finance_db
    username: finance_user
    password: finance_password
    driver-class-name: org.postgresql.Driver

  # Hibernate Konfigürasyonu
  jpa:
    hibernate:
      ddl-auto: validate # Flyway aktif olduğu için validate bırakılmalıdır
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true


  # Flyway Konfigürasyonu
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Redis Konfigürasyonu
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka Konfigürasyonu
  kafka:
    kafka:
      bootstrap-servers: localhost:9092
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      consumer:
        group-id: finance-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          spring.json.trusted.packages: "*" # Her paketten gelen JSON'a güven

  # Keycloak / OAuth2 Resource Server Konfigürasyonu
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/finance-realm

  # OpenLDAP Konfigürasyonu
  ldap:
    urls: ldap://localhost:1389
    base: dc=finance,dc=local
    username: cn=admin,dc=finance,dc=local
    password: adminpassword

  # OpenSearch Konfigürasyonu (Spring Data Elasticsearch via REST)
  elasticsearch:
    uris: http://localhost:9200

  management:
    tracing:
      sampling:
        probability: 1.0 # %100: Gelen her HTTP isteğini ve metrikleri kaydet
    endpoints:
      web:
        exposure:
          include: "health,info,prometheus" # Performans metriklerini dışarı aç

finance:
  spread:
    default-base: 0.05
    multipliers:
      Ziraat: 1.2
      Vakifbank: 1.3
      IsBankasi: 1.5
      Garanti: 1.8
      Akbank: 1.9
      YapiKredi: 1.7

server:
  port: 8081


