# Grafana Tempo 2.4.1 — dağıtık izleme (trace) deposu.
# OTLP gRPC'yi 4317'de (container-içi) dinler; Collector tempo:4317'ye gönderir.
# HTTP API 3200 (Grafana Tempo datasource buraya bağlanır).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h   # trace saklama süresi (SS: 48h retention)

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Service graph / span metrics üretimi (opsiyonel ama Grafana'da faydalı)
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
