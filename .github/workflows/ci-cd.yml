name: Finance Portal CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # SonarCloud secret'lari job-level env'e cek — sonra if: env.SONAR_TOKEN != '' calisir.
    # Secret tanimsiz iken bu env'ler bos string olur, sonar step'i skip.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

    steps:
      - name: Kodu Cek (Checkout)
        uses: actions/checkout@v4
        with:
          # SonarCloud blame icin tam git tarihcesi lazim (shallow=1 ise UNKNOWN olur)
          fetch-depth: 0

      - name: JDK 21 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # mvnw Windows'tan commit edildigi icin Linux'ta execute biti yok
      # (Git on Windows core.fileMode=false default). chmod +x ile fix.
      - name: mvnw'ye Execute Yetkisi Ver
        run: chmod +x ./mvnw
        working-directory: ./finance_portal

      # mvn verify = compile + Surefire (unit) + Failsafe (IT) + JaCoCo report
      # JaCoCo plugin'i verify fazında target/site/jacoco/jacoco.xml uretir.
      - name: Maven Build + Test + Coverage (mvn verify)
        run: ./mvnw -B --no-transfer-progress verify
        working-directory: ./finance_portal

      # JaCoCo XML + HTML raporlarini artifact olarak yukle (14 gun saklanir).
      - name: JaCoCo Coverage Raporunu Artifact Olarak Yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: finance_portal/target/site/jacoco/
          retention-days: 14

      # SonarCloud analizi — sadece SONAR_TOKEN secret'i tanimliysa kosar.
      # Setup icin: finance_portal/docs/sonar-ci.md
      - name: SonarCloud Analizi (opsiyonel)
        if: env.SONAR_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw -B --no-transfer-progress sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=${SONAR_ORGANIZATION} \
            -Dsonar.projectKey=${SONAR_PROJECT_KEY}
        working-directory: ./finance_portal

      - name: Docker Compose Testi (Build Kontrolu)
        run: docker compose config
        working-directory: ./finance_portal
