apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: finance
type: Opaque
stringData:
  POSTGRES_DB: finance_db
  POSTGRES_USER: finance_user
  POSTGRES_PASSWORD: finance_password
  DB_USERNAME: finance_user
  DB_PASSWORD: finance_password
  DB_URL: jdbc:postgresql://postgres:5432/finance_db
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: finance
type: Opaque
stringData:
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
  KC_DB: postgres
  KC_DB_URL: jdbc:postgresql://postgres:5432/finance_db
  KC_DB_USERNAME: finance_user
  KC_DB_PASSWORD: finance_password
---
apiVersion: v1
kind: Secret
metadata:
  name: openldap-admin
  namespace: finance
type: Opaque
stringData:
  LDAP_ADMIN_PASSWORD: adminpassword
---
# Backend için TÜM external API key'leri ve secret'lar
# NOT: prod'da bunlar GCP Secret Manager + Workload Identity ile yönetilir.
# Demo için inline. Boş string'ler güvenli — backend bunlarda graceful degradation yapıyor.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: finance
type: Opaque
stringData:
  # Gerçek değerler git'e KONULMAZ — deploy'da gitignore'lu overlay / GCP Secret Manager ile verilir.
  EVDS_API_KEY: ""
  FRED_API_KEY: ""
  FMP_API_KEY: ""
  FINNHUB_API_KEY: ""
  GROQ_API_KEY: ""
  GEMINI_API_KEY: ""
  APP_MAIL_USERNAME: ""
  APP_MAIL_PASSWORD: ""
