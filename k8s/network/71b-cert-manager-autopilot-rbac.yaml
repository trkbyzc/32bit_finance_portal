# GKE Autopilot Warden Policy fix — cert-manager kendi namespace'inde
# leader election lease'leri yönetebilsin diye eksik Role+Binding'ler.
#
# Default cert-manager install'da Role'ler kube-system'a kurulu, Autopilot
# Warden kube-system'a yazmayi blokluyor. Bu manifest cert-manager namespace'inde
# duplicate ediyor.
#
# Apply siralami: open-cluster.ps1 cert-manager kurduktan sonra otomatik apply eder.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-cainjector-leaderelection
  namespace: cert-manager
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-cainjector-leaderelection
  namespace: cert-manager
subjects:
  - kind: ServiceAccount
    name: cert-manager-cainjector
    namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-cainjector-leaderelection
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-controller-leaderelection
  namespace: cert-manager
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-controller-leaderelection
  namespace: cert-manager
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-controller-leaderelection
