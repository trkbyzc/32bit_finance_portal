# Finance Portal Ingress — NGINX Ingress Controller + cert-manager TLS.
#
# NGINX Ingress kurulumu (cluster oluştuktan sonra):
#   helm install ingress-nginx ingress-nginx/ingress-nginx \
#     --namespace ingress-nginx --create-namespace
#   # veya YAML ile:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.2/deploy/static/provider/cloud/deploy.yaml
#
# Public IP:
#   kubectl get svc ingress-nginx-controller -n ingress-nginx \
#     -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
#
# Hostname: <IP>.nip.io (örn. 34-36-210-150.nip.io)
# open-cluster.ps1 scripti bu host'u otomatik tespit edip burayı patch eder.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-portal-ingress
  namespace: finance
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - REPLACE_WITH_HOST.nip.io      # open-cluster.ps1 patch eder
      secretName: finance-portal-tls
    - hosts:
        - kc.REPLACE_WITH_HOST.nip.io   # Keycloak HTTPS subdomain
      secretName: keycloak-tls
  rules:
    - host: REPLACE_WITH_HOST.nip.io     # open-cluster.ps1 patch eder
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-frontend
                port:
                  number: 80
    - host: kc.REPLACE_WITH_HOST.nip.io  # Keycloak HTTPS
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
