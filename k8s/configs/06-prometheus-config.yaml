apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: finance
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'finance-portal-backend'
        metrics_path: '/api/v1/actuator/prometheus'
        static_configs:
          - targets: ['app-backend:8081']
            labels:
              application: 'finance-portal'
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
