apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: finance
data:
  otel-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
      resource:
        attributes:
          - key: service.namespace
            value: finance-portal
            action: upsert
          - key: deployment.environment
            value: k8s
            action: upsert
    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
          enabled: true
      debug:
        verbosity: basic
    service:
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [prometheus]
