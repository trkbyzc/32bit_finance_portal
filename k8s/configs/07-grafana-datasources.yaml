apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: finance
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        uid: prometheus
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          httpMethod: POST
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: tempo
      - name: Tempo
        type: tempo
        access: proxy
        uid: tempo
        url: http://tempo:3200
        jsonData:
          httpMethod: GET
          tracesToLogsV2:
            datasourceUid: opensearch
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: true
            customQuery: true
            query: 'mdc.traceId:"$${__trace.traceId}"'
          tracesToMetrics:
            datasourceUid: prometheus
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
      - name: OpenSearch
        type: grafana-opensearch-datasource
        access: proxy
        uid: opensearch
        url: http://opensearch:9200
        jsonData:
          database: 'finance-logs-*'
          flavor: 'OpenSearch'
          version: '2.11.1'
          timeField: '@timestamp'
          pplEnabled: true
