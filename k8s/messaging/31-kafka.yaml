# Kafka 3.7 (Apache resmi) — KRaft mode (Zookeeper SIZ).
# Bitnami Aug 2025'te free image'ları "bitnamilegacy" namespace'e taşıdı, bitnami/kafka:3.7
# 404 veriyor. Apache resmi image'ı KRaft için en sade — auto-format eder.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: finance
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: finance
spec:
  replicas: 1
  strategy:
    type: Recreate   # KRaft state dosyaları için tek pod
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_NUM_PARTITIONS
              value: "1"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "1"
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qg"
            - name: KAFKA_HEAP_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9092
              name: plaintext
            - containerPort: 9093
              name: controller
          resources:
            requests:
              cpu: "500m"
              memory: "1.5Gi"
              ephemeral-storage: "2Gi"
            limits:
              cpu: "1000m"
              memory: "1.5Gi"
              ephemeral-storage: "2Gi"
          startupProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 60   # 5dk
          readinessProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 10
            failureThreshold: 3
