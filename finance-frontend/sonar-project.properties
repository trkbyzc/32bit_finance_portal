# SonarQube projesi — FinansPortal Frontend (Vitest + v8 coverage)
#
# Backend (Java) ayrı bir Sonar projesi olarak ölçülüyor (finance-portal-backend).
# Bu dosya yalnız frontend (React/JS) kapsamını tanımlar — npm run sonar ile gönderilir.

sonar.projectKey=finance-portal-frontend
sonar.projectName=Finance Portal Frontend
sonar.projectVersion=0.0.1-SNAPSHOT

# Lokal SonarQube docker container (docker compose --profile sonar up -d sonarqube)
sonar.host.url=http://localhost:9000

# Kaynak ve test path'leri
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Vitest v8 coverage → lcov reporter çıktısı (vite.config.js'te tanımlı)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Sonar JS analyzer'ı node_modules dahili paketleri kapsama dahil etmesin
sonar.sourceEncoding=UTF-8
