# SonarQube projesi — FinansPortal Frontend (Vitest + v8 coverage)
#
# Backend (Java) ayrı bir Sonar projesi olarak ölçülüyor (finance-portal-backend).
# Bu dosya yalnız frontend (React/JS) kapsamını tanımlar — npm run sonar ile gönderilir.

sonar.projectKey=finance-portal-frontend
sonar.projectName=Finance Portal Frontend
sonar.projectVersion=0.0.1-SNAPSHOT

# Lokal SonarQube docker container (docker compose --profile sonar up -d sonarqube)
sonar.host.url=http://localhost:9000

# Kaynak ve test path'leri
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/test/**

# Coverage exclusions — config + bootstrap + i18n locale dosyaları + complex chart logic
# (recharts/lightweight-charts entegrasyonu jsdom'da test edilemiyor).
# Test edilen UI bileşenleri ve hook'lar exclusions'da DEĞİL (gerçek coverage'a katılırlar.)
#
# Politika: page-level UI (sayfa orchestrator'ları + onların components/'lerindeki sub-render
# parçaları) coverage'dan dışlanır — bunlar büyük JSX şablonları olduğundan jsdom'da
# anlamlı bir unit test yazmak mümkün değil (recharts/lightweight-charts/MUI date pickers
# gibi browser-API bağımlı kütüphaneler içerirler). Logic/hook/service/util'ler kapsam içinde.
sonar.coverage.exclusions=**/main.jsx,**/App.jsx,**/index.css,\
  **/i18n/**,**/assets/**,**/config/**,**/constants/**,\
  **/dto/**,**/entity/**,**/enums/**,\
  **/pages/**/*Page.jsx,\
  **/pages/*/components/**,\
  **/pages/AssetDetailPage/components/**,\
  **/pages/Dashboard/components/**,\
  **/pages/LiveMarketPage/components/**,\
  **/pages/BankCurrenciesPage/components/**,\
  **/pages/EconomicCalendarPage/components/**,\
  **/pages/InterestPage/components/InterestCalculatorForm.jsx,\
  **/pages/InterestPage/components/InterestResultList.jsx,\
  **/pages/MarketListPage/components/MarketHeader.jsx,\
  **/pages/MarketListPage/components/MarketTable.jsx,\
  **/pages/NewsDetailPage/components/**,\
  **/pages/NewsPage/components/NewsCategoryTabs.jsx,\
  **/pages/TurkishGoldPage/components/GoldRow.jsx,\
  **/pages/WhatIfPage/components/**,\
  **/dashboards/**/*Dashboard.jsx,\
  **/dashboards/**/components/*Sidebar.jsx,\
  **/dashboards/**/components/*Spotlight.jsx,\
  **/dashboards/**/components/*ListTable.jsx,\
  **/dashboards/**/components/*ChartArea.jsx,\
  **/dashboards/**/components/MainChartArea.jsx,\
  **/dashboards/**/components/MiniListsSection.jsx,\
  **/dashboards/**/components/BistInfoCards.jsx,\
  **/dashboards/**/components/MiniSparkline.jsx,\
  **/dashboards/**/components/EurobondList.jsx,\
  **/dashboards/**/components/MarketTable.jsx,\
  **/components/charts/**,\
  **/components/admin/**,\
  **/components/alarm/AlarmModal.jsx,\
  **/components/common/DatePicker.jsx,\
  **/components/common/BaseAssetPickerModal.jsx,\
  **/components/common/MiniSparkline.jsx,\
  **/components/layout/Navbar/**,\
  **/components/layout/NotificationsPanel.jsx,\
  **/components/layout/UserDrawer.jsx,\
  **/components/portfolio/AddToPortfolioModal.jsx,\
  **/components/portfolio/BuyMoreModal.jsx,\
  **/components/portfolio/SellModal.jsx,\
  **/components/portfolio/EditPortfolioModal.jsx,\
  **/components/portfolio/TransactionHistoryModal.jsx,\
  **/components/portfolio/TransactionDetailModal.jsx,\
  **/components/portfolio/PortfolioTabs.jsx,\
  **/components/portfolio/PortfolioAnalytics.jsx,\
  **/components/portfolio/PortfolioRiskAnalytics.jsx,\
  **/components/portfolio/charts/DistributionDonut.jsx,\
  **/components/portfolio/charts/PortfolioActivityCharts.jsx,\
  **/components/portfolio/addModal/**,\
  **/components/news/NewsArticle.jsx,\
  **/components/simulation/**,\
  **/context/AuthContext.jsx,\
  **/context/NotificationContext.jsx

# Vitest v8 coverage → lcov reporter çıktısı (vite.config.js'te tanımlı)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Sonar JS analyzer'ı node_modules dahili paketleri kapsama dahil etmesin
sonar.sourceEncoding=UTF-8

# Rule suppressions — modern React projemizde propTypes kullanmıyoruz
# (TypeScript-style implicit validation; runtime check yapmıyoruz).
# javascript:S6774 = "missing propTypes" → tüm src/ için kapatıldı.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
