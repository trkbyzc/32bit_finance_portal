# Finance Portal Frontend — Nginx config (SPA + API proxy)
#
# - Static dosyalar /usr/share/nginx/html'den serve edilir.
# - React Router için try_files fallback (deep link → index.html).
# - /api/ istekleri docker-compose'daki `app-backend` servisine proxy edilir.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip — statik asset'ler için bant genişliği tasarrufu
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # SPA fallback — tüm bilinmeyen path'leri index.html'e yönlendir (React Router yakalar)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — frontend container'dan backend container'a (docker network içi DNS)
    location /api/ {
        proxy_pass http://app-backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OAuth2 / Bearer token header'ları geçsin
        proxy_pass_request_headers on;
        # Long polling / SSE için timeout artır
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache-Control: HTML cache'lenmesin (immutable hashed asset'ler hariç)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
